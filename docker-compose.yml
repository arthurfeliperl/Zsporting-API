version: '3.8'

services:
  db:
    image: postgres:15
    container_name: zsporting_db
    restart: always
    environment:
      POSTGRES_DB: zsportingdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
